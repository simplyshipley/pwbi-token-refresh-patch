$schema: https://git.drupalcode.org/project/drupal/-/raw/HEAD/core/assets/schemas/v1/metadata.schema.json
name: Power Bi embed
status: stable
props:
  type: object
  required:
    - report_id
    - report_width
    - report_width_units
  properties:
    report_id:
      title: Report id
      description: Power bi report id.
      examples:
        - sdfuern23421.
      type: string
    report_width:
      title: Report width
      description: Width of the report container.
      examples:
        - 100
      type: string
    report_width_units:
      title: Width units
      description: Type of units for the report container width.
      examples:
        - px
      type: string
slots:
  media_styles:
    title: Media styles
    description: Style for media breakpoints.
    required: true
  overlay_top:
    title: Overlay message
    description: Block message at the top of the pwbi container.
    required: false
  overlay_blocking:
    title: Blocking overlay
    description: Block message blocking the pwbi container.
    required: false
libraryOverrides:
  dependencies:
    - pwbi/pwbi_client
