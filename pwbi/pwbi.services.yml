services:
  pwbi.credential_provider_decorator:
    class: Drupal\pwbi\ConfigurationCredentialProvider
    decorates: oauth2_client.service.credentials
    public: false
    arguments: ['@state', '@entity_type.manager', '@pwbi.cert_manager', '@config.factory']

  pwbi_api.client:
    class: '\Drupal\pwbi\Api\PowerBiClient'
    arguments: ['@state' ,'@logger.factory', '@http_client', '@oauth2_client.service', '@file_url_generator', '@file_system']

  pwbi_embed.embed:
    class: '\Drupal\pwbi\PowerBiEmbed'
    arguments: ['@state' ,'@logger.factory', '@pwbi_api.client']

  pwbi.cert_manager:
    class: '\Drupal\pwbi\Cert\CertificateManager'
    arguments: ['@config.factory' ,'@logger.factory', '@pwbi_api.client', '@entity_type.manager']

  pwbi.oauth_form_changes:
    class: '\Drupal\pwbi\Oauth2Form\FormChanges'
    arguments: ['@config.factory', '@pwbi.cert_manager']

  pwbi.pwbi_cache_response_subscriber:
    class: Drupal\pwbi\EventSubscriber\PwbiResponseSubscriber
    arguments: ['@datetime.time', '@current_user']
    tags:
      - { name: event_subscriber }
