oauth2_client.oauth2_client.*.third_party.pwbi:
  type: config_entity
  label: OAuth2 Client
  mapping:
    tenant:
      type: string
      label: Tenant
    client_id:
      type: string
      label: Client ID
    client_secret:
      type: string
      label: Client secret
    use_cert:
      type: string
      label: Use certificate
    cert_file:
      type: string
      label: Certificate file

pwbi_embed.embed:
  type: config_object
  label: Power Bi workspaces
  mapping:
    pwbi_workspaces:
      type: string
      label: PowerBi Workspaces

pwbi.settings:
  type: config_object
  label: Power BI module settings
  mapping:
    pwbi_api_endpoint:
      type: string
      label: Power BI API endpoint
    token_refresh_enabled:
      type: boolean
      label: Enable automatic embed token refresh
    token_refresh_minutes:
      type: integer
      label: Minutes before expiry to refresh
    debug_enabled:
      type: boolean
      label: Enable debug logging
    block_subscribe_heartbeat:
      type: boolean
      label: Block subscribe heartbeat requests

media.source.pwbi_embed_visual:
  type: media.source.field_aware
  label: '"PWBI Embed" media source configuration'
