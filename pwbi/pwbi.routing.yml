pwbi.settings:
  path: '/admin/config/pwbi'
  defaults:
    _controller: '\Drupal\system\Controller\SystemController::systemAdminMenuBlockPage'
    _title: 'PowerBi'
  requirements:
    _permission: 'configure pwbi'

pwbi.api_test:
  path: '/admin/config/pwbi/api_test'
  defaults:
    _form: '\Drupal\pwbi\Form\PowerBiRestApiTestForm'
    _title: 'Run requests against PowerBi Rest Api.'
  requirements:
    _permission: 'configure pwbi'

pwbi.embed_settings:
  path: '/admin/config/pwbi/embed_settings'
  defaults:
    _form: '\Drupal\pwbi\Form\PowerBiEmbedConfigForm'
    _title: 'PowerBi Embed Settings'
  requirements:
    _permission: 'configure pwbi'

pwbi.token_refresh:
  path: '/pwbi/token-refresh/{workspace_id}/{report_id}'
  defaults:
    _controller: '\Drupal\pwbi\Controller\PwbiTokenRefreshController::refresh'
    _title: 'Power BI token refresh'
  requirements:
    _permission: 'view pwbi embed token'
    workspace_id: '[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}'
    report_id: '[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}'
  options:
    no_cache: TRUE
